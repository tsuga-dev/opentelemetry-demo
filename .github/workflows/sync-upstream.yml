name: Sync Upstream

on:
  push:
    branches: [feat/sync-upstream-ci]
  schedule:
    # Runs at 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.repository == 'tsuga-dev/opentelemetry-demo'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run upstream sync script
        id: sync
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/cherrypick-upstream.sh

      - name: Capture conflicted files
        id: conflicts
        if: steps.sync.outcome == 'failure'
        run: |
          files="$(git diff --name-only --diff-filter=U | tr '\n' ' ')"
          echo "files=${files}" >> "$GITHUB_OUTPUT"

      - name: Abort merge
        if: steps.sync.outcome == 'failure'
        run: git merge --abort

      - name: Create conflict issue
        if: steps.sync.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          today="$(date +%Y-%m-%d)"
          files="${{ steps.conflicts.outputs.files }}"
          gh issue create \
            --title "Upstream sync conflict — manual resolution needed ${today}" \
            --body "## Upstream sync conflict detected

          The automated daily upstream sync hit a merge conflict on **${today}** and could not complete automatically.

          ### Conflicted files

          \`\`\`
          ${files}
          \`\`\`

          ### How to resolve

          1. Set up the upstream remote if you haven't already:
             \`\`\`bash
             git remote add upstream https://github.com/open-telemetry/opentelemetry-demo.git
             \`\`\`
          2. Fetch the latest upstream commits:
             \`\`\`bash
             git fetch upstream main
             \`\`\`
          3. Check out the sync branch:
             \`\`\`bash
             git checkout sync/upstream
             \`\`\`
          4. Start the merge:
             \`\`\`bash
             git merge upstream/main
             \`\`\`
          5. Open each conflicted file listed above and resolve the conflicts (look for \`<<<<<<<\`, \`=======\`, \`>>>>>>>\` markers).
          6. Stage the resolved files and finish the merge:
             \`\`\`bash
             git add <resolved-files>
             git merge --continue
             \`\`\`
          7. Push the branch:
             \`\`\`bash
             git push origin sync/upstream
             \`\`\`
          8. Run the workflow manually (workflow_dispatch) or wait for the next daily run — it will open the PR automatically once the conflict is resolved."

      - name: Fail job on conflict
        if: steps.sync.outcome == 'failure'
        run: exit 1
